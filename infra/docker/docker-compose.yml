services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-control-plane-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_control_plane
    ports:
      - "54329:5432"
    volumes:
      - agent-control-plane-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_control_plane"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: web
    container_name: agent-control-plane-web
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/agent_control_plane?schema=public
      CONTROL_PLANE_BASE_URL: http://web:3100
      PORT: "3100"
    ports:
      - "3100:3100"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: worker
    container_name: agent-control-plane-worker
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/agent_control_plane?schema=public
      WORKER_RUN_LOOP: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  agent-control-plane-postgres:
