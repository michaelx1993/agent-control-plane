services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-control-plane-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_control_plane
    ports:
      - "54329:5432"
    volumes:
      - agent-control-plane-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_control_plane"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agent-control-plane-postgres:
