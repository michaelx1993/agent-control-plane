name: Release

on:
  push:
    tags:
      - "v*"
      - "agent-control-plane-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version and Docker tag"
        required: true
        default: "0.0.1"
      image_repository:
        description: "Docker image repository"
        required: true
        default: "michaelxxx/agent-control-plane"

permissions:
  contents: read

jobs:
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ -z "$version" ]]; then
            version="${GITHUB_REF_NAME#agent-control-plane-v}"
            version="${version#v}"
          fi

          image_repository="${{ inputs.image_repository }}"
          if [[ -z "$image_repository" ]]; then
            image_repository="michaelxxx/agent-control-plane"
          fi

          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([._-][A-Za-z0-9][A-Za-z0-9._-]*)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${image_repository}" >> "$GITHUB_OUTPUT"
          echo "image=${image_repository}:${version}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Release gate
        run: pnpm check

      - name: Publish image
        env:
          IMAGE_REPOSITORY: ${{ steps.meta.outputs.image_repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
          PUSH_IMAGE: "true"
          RELEASE_IMAGE_SKIP_VALIDATION: "true"
        run: pnpm release:image

      - name: Summary
        run: |
          {
            echo "## Docker image"
            echo ""
            echo "- ${{ steps.meta.outputs.image }}"
            echo "- ${{ steps.meta.outputs.image_repository }}:latest"
          } >> "$GITHUB_STEP_SUMMARY"
