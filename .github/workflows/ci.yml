name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: agent
          POSTGRES_PASSWORD: agent
          POSTGRES_DB: agent_control_plane_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent -d agent_control_plane_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://agent:agent@localhost:5432/agent_control_plane_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate database migration
        run: pnpm db:migrate && pnpm db:seed

      - name: Format
        run: pnpm format

      - name: Check
        run: pnpm check

      - name: Compose smoke
        run: pnpm compose:smoke

      - name: Release image smoke
        run: RELEASE_IMAGE_SKIP_VALIDATION=true IMAGE_REPOSITORY=agent-control-plane IMAGE_TAG=ci-smoke pnpm release:image

      - name: Deploy compose dry-run
        run: DEPLOY_COMPOSE_DRY_RUN=true ACP_IMAGE=agent-control-plane:ci-smoke pnpm deploy:compose

      - name: Rollback compose dry-run
        run: ROLLBACK_COMPOSE_DRY_RUN=true ROLLBACK_IMAGE=agent-control-plane:ci-smoke pnpm rollback:compose

      - name: Build
        run: pnpm build
